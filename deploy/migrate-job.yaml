# Runs database migrations before each sync (Argo CD PreSync hook).
apiVersion: batch/v1
kind: Job
metadata:
  name: dsm-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: migrate
          image: ghcr.io/jumarubea/dsm-api:latest
          command: ['npm', 'run', 'migrate:up']
          envFrom:
            - secretRef:
                name: dsm-secrets
