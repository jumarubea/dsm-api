apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsm-ingress
  annotations:
    # Issue a Let's Encrypt cert per host on demand (HTTP-01).
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
spec:
  ingressClassName: traefik
  rules:
    # Wildcard domain: app.my-net.tech (super admin) + every <tenant>.my-net.tech.
    # TLS is issued on demand per host by Traefik's Let's Encrypt resolver.
    - host: '*.my-net.tech'
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: dsm-api
                port:
                  number: 3000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: dsm-api
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: dsm-api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsm-web
                port:
                  number: 80
