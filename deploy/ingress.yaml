apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsm-ingress
  annotations:
    # Issue a Let's Encrypt cert per host on demand (HTTP-01).
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
spec:
  ingressClassName: traefik
  rules:
    # Single host for all roles; tenant is resolved from the JWT (subdomain 'app'
    # falls back to the token's tenant). HTTP-01 issues a normal cert for this host.
    # Per-tenant vanity subdomains would need a wildcard cert via DNS-01.
    - host: app.my-net.tech
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: dsm-api
                port:
                  number: 3000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: dsm-api
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: dsm-api
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsm-web
                port:
                  number: 80
