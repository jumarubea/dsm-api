name: Build & Push image

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/**'
      - '**.md'

permissions:
  contents: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dsm-api
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps: pin the new tag into the manifest so Argo CD rolls it out.
      - name: Pin deploy image tag
        run: |
          sed -i "s|newTag:.*|newTag: sha-${GITHUB_SHA}|" deploy/kustomization.yaml
          git diff --quiet && { echo "no change"; exit 0; }
          git config user.name "dsm-ci"
          git config user.email "ci@dsm.local"
          git commit -am "deploy: dsm-api ${GITHUB_SHA} [skip ci]"
          git push
